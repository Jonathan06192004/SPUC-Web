<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hope Channel South Philippines - Broadcast Schedule</title>
    <link rel="stylesheet" href="Styles/index.css">
</head>

<body>

    <header class="top-branding">
        <div class="header-left">
            <img src="Assets/HCLogo.png" alt="Hope Channel Logo" class="hc-logo">
            <div class="header-text">
                <p class="welcome-text">WELCOME TO</p>
                <h1 class="channel-name">Hope Channel</h1>
                <p class="subtitle-text">SOUTH PHILIPPINES</p>
            </div>
        </div>
        <div class="header-right">
            <div class="rectangle-yellow"></div>
            <img src="Assets/SWPUC Territory.png" alt="SWPUC Territory" class="territory-info">
            <img src="Assets/map.png" alt="Territory Map" class="territory-map">
        </div>
        <div class="header-bottom"></div>
    </header>

    <div class="time-display-header">
        <span class="time-label-header">TIME:</span>
        <span class="current-time-header" id="currentTime"></span>
    </div>


    <main class="main-container">

        <div class="content-layout">
            <section class="list-container">
                 <div class="schedule-header">
                    <p class="subtitle">TODAY'S SCHEDULE</p>
                    <h1 class="date-display"><span class="day-highlight">MONDAY</span> MARCH 9, 2026</h1>
                </div>
                <div class="schedule-row">
                    <span class="time-range">8:00-8:30am</span>
                    <span class="program-name">KIDS OF HOPE</span>
                </div>
                <div class="schedule-row">
                    <span class="time-range">8:30-9:00am</span>
                    <span class="program-name">TAKNA SA PAGTUON</span>
                </div>
                <div class="schedule-row">
                    <span class="time-range">9:00-9:30am</span>
                    <span class="program-name">HOPE WORSHIP</span>
                </div>
                <div class="schedule-row">
                    <span class="time-range">9:30-10:00am</span>
                    <span class="program-name">PRAISE EXPERIENCE</span>
                </div>
            </section>

            <aside class="preview-area">
                <div class="image-box">
                    <img src="Assets/Preview.png" alt="Live Preview" id="imageSlider">
                </div>
                <div class="video-box">
                    <iframe id="youtubeVideo" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>
            </aside>
        </div>
    </main>

    <script>
        function updateTime() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const seconds = now.getSeconds().toString().padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            const displayHours = hours % 12 || 12;
            
            document.getElementById('currentTime').textContent = `${displayHours}:${minutes}:${seconds} ${ampm}`;
        }

        updateTime();
        setInterval(updateTime, 1000);
    </script>

</body>

</html>
