<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Profile</title>
    <link rel="stylesheet" href="../Styles/AdminProfile.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Header -->
    <header class="admin-header">
        <div class="header-content">
            <div class="logo-section">
                <div class="logo-icon">
                    <i class="fas fa-shield-halved"></i>
                </div>
                <div>
                    <h1>Admin Profile</h1>
                    <p>Manage Your Account</p>
                </div>
            </div>
            <div class="user-menu">
                <button class="menu-toggle" id="menuToggle">
                    <i class="fas fa-chevron-down"></i>
                </button>
                <div class="dropdown-menu" id="dropdownMenu">
                    <button class="menu-item" onclick="location.href='AdminDashboard.html'">
                        <i class="fas fa-dashboard"></i>
                        <span>Dashboard</span>
                    </button>
                    <button class="menu-item" id="darkModeToggle">
                        <i class="fas fa-moon"></i>
                        <span>Dark Mode</span>
                    </button>
                    <button class="logout-btn" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i>
                        <span>Logout</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <div class="profile-container">
        <!-- Profile Info Card -->
        <div class="profile-card">
            <div class="profile-avatar">
                <i class="fas fa-user-circle"></i>
            </div>
            <h2 id="displayName">Jonath</h2>
            <p class="profile-email">Administrator</p>
        </div>

        <!-- Change Name -->
        <div class="settings-card">
            <h3><i class="fas fa-id-card"></i> Change Name</h3>
            <form id="nameForm">
                <label>Current Name</label>
                <input type="text" id="currentName" value="Administrator" disabled>
                
                <label>New Name</label>
                <input type="text" id="newName" placeholder="Enter new name" required>
                
                <button type="submit">
                    <i class="fas fa-save"></i>
                    <span>Update Name</span>
                </button>
            </form>
        </div>

        <!-- Change Username -->
        <div class="settings-card">
            <h3><i class="fas fa-user-edit"></i> Change Username</h3>
            <form id="usernameForm">
                <label>Current Username</label>
                <input type="text" id="currentUsername" value="admin" disabled>
                
                <label>New Username</label>
                <input type="text" id="newUsername" placeholder="Enter new username" required>
                
                <button type="submit">
                    <i class="fas fa-save"></i>
                    <span>Update Username</span>
                </button>
            </form>
        </div>

        <!-- Change Password -->
        <div class="settings-card">
            <h3><i class="fas fa-lock"></i> Change Password</h3>
            <form id="passwordForm">
                <label>Current Password</label>
                <div class="password-wrapper">
                    <input type="password" id="currentPassword" placeholder="Enter current password" required>
                    <i class="fas fa-eye toggle-password"></i>
                </div>
                
                <label>New Password</label>
                <div class="password-wrapper">
                    <input type="password" id="newPassword" placeholder="Enter new password" required>
                    <i class="fas fa-eye toggle-password"></i>
                </div>
                
                <label>Confirm New Password</label>
                <div class="password-wrapper">
                    <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
                    <i class="fas fa-eye toggle-password"></i>
                </div>
                
                <button type="submit">
                    <i class="fas fa-save"></i>
                    <span>Update Password</span>
                </button>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer class="admin-footer">
        <div class="footer-content">
            <div class="footer-left">
                <div class="footer-logo">
                    <i class="fas fa-shield-halved"></i>
                </div>
                <div>
                    <p class="footer-title">Hope Channel</p>
                    <p class="footer-subtitle">Admin Management System</p>
                </div>
            </div>
            <div class="footer-right">
                <a href="../index.html" class="home-btn">
                    <i class="fas fa-home"></i>
                    <span>Back to Home</span>
                </a>
            </div>
        </div>
    </footer>

<script type="module" src="../script/AdminProfile.js"></script>

</body>
</html>
